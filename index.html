<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Employee</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a14;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <!-- p5.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- Game files — load order matters: constants first, sketch last -->
  <script src="gamestate.js"></script>  <!-- STATE enum, PAL colors, WORLD_W/H, GameState class -->
  <script src="item.js"></script>       <!-- Item class (depends on PAL) -->
  <script src="shelf.js"></script>      <!-- Shelf class (depends on Item, PAL) -->
  <script src="npc.js"></script>        <!-- NPC class (depends on PAL, WORLD_W/H) -->
  <script src="player.js"></script>     <!-- Player class (depends on PAL, WORLD_W/H) -->
  <script src="store.js"></script>      <!-- Store class (depends on Shelf, NPC, PAL) -->
  <script src="ui.js"></script>         <!-- UI class (depends on PAL, TOP_BAR_H, RIGHT_PANEL_W) -->
  <script src="sketch.js"></script>     <!-- p5 setup/draw — entry point -->
</body>
</html>
